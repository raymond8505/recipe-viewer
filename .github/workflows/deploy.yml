name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker build
        run: docker build --build-arg NEXT_PUBLIC_SUPABASE_URL=placeholder --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=placeholder .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SUPABASE_URL,SUPABASE_KEY
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            git pull origin main

            # Write env file for docker compose build args (only if secrets are configured)
            if [ -n "${SUPABASE_URL}" ] && [ -n "${SUPABASE_KEY}" ]; then
              printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=%s\n' \
                "${SUPABASE_URL}" \
                "${SUPABASE_KEY}" > .env
            fi

            docker compose up -d --build --remove-orphans

            # Clean up dangling images after build
            docker image prune -f
