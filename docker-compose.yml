services:
  recipe-viewer:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
    container_name: recipe-viewer
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.recipe-viewer.rule=Host(`new.raymonds.recipes`)"
      - "traefik.http.routers.recipe-viewer.entrypoints=websecure"
      - "traefik.http.routers.recipe-viewer.tls.certresolver=mytlschallenge"
      - "traefik.http.services.recipe-viewer.loadbalancer.server.port=3001"
      - "traefik.http.routers.recipe-viewer-http.rule=Host(`new.raymonds.recipes`)"
      - "traefik.http.routers.recipe-viewer-http.entrypoints=web"
      - "traefik.http.routers.recipe-viewer-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  n8n_default:
    external: true
